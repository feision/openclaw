<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worker 配置生成器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg:       #0d0f14;
    --surface:  #151820;
    --border:   #252a35;
    --accent:   #4fffb0;
    --accent2:  #00b8ff;
    --danger:   #ff4f6b;
    --text:     #e0e6f0;
    --muted:    #5a6275;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Noto Sans SC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    padding: 24px 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: linear-gradient(90deg, #0d0f14 0%, #111520 100%);
  }
  .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    color: #000;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 17nc;
    font-weight: 500;
    letter-spacing: .04em;
    color: var(--text);
  }
  header span {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    margin-left: 4px;
  }
  .header-badge {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    opacity: .7;
  }

  /* ── Panels ── */
  .config-panel {
    padding: 28px 32px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }
  .output-panel {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #0b0d11;
  }

  /* ── Section ── */
  .section {
    margin-bottom: 28px;
  }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Form elements ── */
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  input[type="text"], textarea, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color .15s;
  }
  input[type="text"]:focus,
  textarea:focus,
  select:focus {
    border-color: var(--accent);
  }
  select option { background: #1a1e28; }
  textarea { resize: vertical; min-height: 70px; line-height: 1.6; }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label {
    font-size: 13px;
    color: var(--text);
  }
  .toggle-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: var(--mono);
  }
  .toggle {
    position: relative;
    width: 40px; height: 22px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 22px;
    cursor: pointer;
    transition: background .2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    left: 3px; top: 3px;
    width: 16px; height: 16px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform .2s, background .2s;
  }
  .toggle input:checked + .toggle-track { background: #1a3a2a; }
  .toggle input:checked + .toggle-track::after {
    transform: translateX(18px);
    background: var(--accent);
  }

  /* List items */
  .list-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .list-item input { flex: 1; }
  .btn-icon {
    width: 32px; height: 32px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 16px;
    transition: border-color .15s, color .15s;
    flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--danger); color: var(--danger); }
  .btn-add {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    transition: border-color .15s, color .15s;
    margin-top: 4px;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* Radio group */
  .radio-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .radio-option {
    flex: 1;
    min-width: 90px;
  }
  .radio-option input { display: none; }
  .radio-option label {
    display: block;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: all .15s;
    margin: 0;
  }
  .radio-option input:checked + label {
    border-color: var(--accent);
    color: var(--accent);
    background: #0d2a1a;
  }

  /* Separator input */
  .sep-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .sep-row label { margin: 0; white-space: nowrap; }
  .sep-row input { max-width: 80px; }
  .sep-preview {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── Output ── */
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .output-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .btn-copy {
    padding: 6px 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn-copy:hover { opacity: .85; }
  .btn-copy:active { transform: scale(.97); }
  .btn-copy.copied {
    background: #1a3a2a;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  pre#output {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    overflow: auto;
    color: #c0cce0;
    white-space: pre;
  }

  /* Syntax highlight */
  .hl-comment { color: #445566; }
  .hl-key     { color: var(--accent2); }
  .hl-str     { color: var(--accent); }
  .hl-kw      { color: #ff9f6b; }
  .hl-num     { color: #b088ff; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    padding: 8px 0 0;
  }
  .stats span { color: var(--accent); }

  @media (max-width: 900px) {
    body { grid-template-columns: 1fr; }
    .config-panel { border-right: none; border-bottom: 1px solid var(--border); }
    .output-panel { min-height: 400px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CF</div>
  <h1>Worker 配置生成器 <span>for Clash</span></h1>
  <div class="header-badge">v1.0</div>
</header>

<!-- 左：配置面板 -->
<div class="config-panel">

  <!-- 订阅链接 -->
  <div class="section">
    <div class="section-title">订阅链接</div>
    <label>链接格式：URL#备注（备注可省略）</label>
    <div id="sub-list"></div>
    <button class="btn-add" onclick="addSub()">＋ 添加订阅</button>
  </div>

  <!-- 优选服务器 -->
  <div class="section">
    <div class="section-title">优选服务器</div>
    <label>每个地址生成一组节点，多地址输出多倍节点</label>
    <div id="server-list"></div>
    <button class="btn-add" onclick="addServer()">＋ 添加地址</button>
  </div>

  <!-- 节点名称 -->
  <div class="section">
    <div class="section-title">节点名称模式</div>
    <div class="radio-group">
      <div class="radio-option">
        <input type="radio" name="nameMode" id="nm-original" value="original" checked onchange="generate()">
        <label for="nm-original">保持原名</label>
      </div>
      <div class="radio-option">
        <input type="radio" name="nameMode" id="nm-servername" value="servername" onchange="generate()">
        <label for="nm-servername">改成 servername</label>
      </div>
      <div class="radio-option">
        <input type="radio" name="nameMode" id="nm-server" value="server" onchange="generate()">
        <label for="nm-server">改成 server</label>
      </div>
    </div>
    <div class="sep-row">
      <label>备注分隔符</label>
      <input type="text" id="sep-input" value="#" maxlength="5" style="max-width:70px" oninput="updateSepPreview(); generate()">
      <div class="sep-preview" id="sep-preview">节点名称#备注</div>
    </div>
  </div>

  <!-- 功能开关 -->
  <div class="section">
    <div class="section-title">功能开关</div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">按 servername 去重</div>
        <div class="toggle-desc">相同 servername 只保留第一个节点</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="sw-dedup" checked onchange="generate()">
        <div class="toggle-track"></div>
      </label>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">同名节点自动加序号</div>
        <div class="toggle-desc">避免客户端节点名冲突（加 _2, _3…）</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="sw-seq" checked onchange="generate()">
        <div class="toggle-track"></div>
      </label>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">统一替换 server 地址</div>
        <div class="toggle-desc">关闭后保持原始 server 字段不变</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="sw-server" checked onchange="generate()">
        <div class="toggle-track"></div>
      </label>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">透传 Subscription-Userinfo</div>
        <div class="toggle-desc">客户端可显示剩余流量信息</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="sw-userinfo" checked onchange="generate()">
        <div class="toggle-track"></div>
      </label>
    </div>
  </div>

  <!-- User-Agent -->
  <div class="section">
    <div class="section-title">请求设置</div>
    <label>User-Agent（拉取订阅时使用）</label>
    <input type="text" id="ua-input" value="clash.meta" oninput="generate()">
  </div>

</div>

<!-- 右：代码输出 -->
<div class="output-panel">
  <div class="output-header">
    <div class="output-title">生成的 Worker 代码</div>
    <button class="btn-copy" id="copy-btn" onclick="copyCode()">复制代码</button>
  </div>
  <pre id="output"></pre>
  <div class="stats">
    订阅数量：<span id="stat-sub">0</span> &nbsp;
    优选地址：<span id="stat-srv">0</span> &nbsp;
    代码行数：<span id="stat-lines">0</span>
  </div>
</div>

<script>
// ── 初始数据 ──────────────────────────────────────────────────
const defaultSubs = [
  "https://123.tsm.cc.cd/sub/user/eyJ1IjoiZHVjayIsImUiOjE3Nzc4MDA2Njk3MDgsInMiOiJlNWI0NzQzNmMxYmUxNTY4In0#我的机场",
];
const defaultServers = ["cf.090227.xyz"];

// ── 初始化列表 ────────────────────────────────────────────────
function initList(containerId, items, placeholder) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  items.forEach(v => addItem(containerId, placeholder, v));
}

function addItem(containerId, placeholder, value = "") {
  const el = document.getElementById(containerId);
  const row = document.createElement("div");
  row.className = "list-item";
  row.innerHTML = `
    <input type="text" placeholder="${placeholder}" value="${value}" oninput="generate()">
    <button class="btn-icon" onclick="this.parentElement.remove(); generate()" title="删除">×</button>
  `;
  el.appendChild(row);
}

function addSub()    { addItem("sub-list",    "https://example.com/sub/xxx#备注"); generate(); }
function addServer() { addItem("server-list", "cf.example.com 或 IP 地址");      generate(); }

function getListValues(containerId) {
  return [...document.querySelectorAll(`#${containerId} input`)]
    .map(i => i.value.trim()).filter(Boolean);
}

// ── 备注预览 ──────────────────────────────────────────────────
function updateSepPreview() {
  const sep = document.getElementById("sep-input").value || "#";
  document.getElementById("sep-preview").textContent = `节点名称${sep}备注`;
}

// ── 代码生成 ──────────────────────────────────────────────────
function generate() {
  const subs      = getListValues("sub-list");
  const servers   = getListValues("server-list");
  const nameMode  = document.querySelector('input[name="nameMode"]:checked').value;
  const sep       = document.getElementById("sep-input").value || "#";
  const dedup     = document.getElementById("sw-dedup").checked;
  const autoSeq   = document.getElementById("sw-seq").checked;
  const replSrv   = document.getElementById("sw-server").checked;
  const userinfo  = document.getElementById("sw-userinfo").checked;
  const ua        = document.getElementById("ua-input").value || "clash.meta";

  // 更新统计
  document.getElementById("stat-sub").textContent = subs.length;
  document.getElementById("stat-srv").textContent = servers.length;

  const subArr = subs.map(s => `  "${s}",`).join("\n") || '  // 请添加订阅链接';
  const srvArr = servers.map(s => `  "${s}",`).join("\n") || '  // 请添加优选地址';

  const code = `// ============================================================
// Cloudflare Worker - 多订阅合并 + 去重 + 节点处理
// ============================================================


// ── 配置区 ────────────────────────────────────────────────────

// 【节点名称模式】
// "original"   → 保持原始 name 不变
// "servername" → 把 name 改成 servername 字段的值
// "server"     → 把 name 改成 server 字段的值（替换后的优选地址）
const NAME_MODE = "${nameMode}";

// 【备注分隔符】拼在节点名称和备注之间
const LABEL_SEP = "${sep}";

// 【功能开关】
const ENABLE_DEDUP    = ${dedup};   // 按 servername 去重
const ENABLE_AUTO_SEQ = ${autoSeq}; // 同名节点自动加序号
const REPLACE_SERVER  = ${replSrv}; // 统一替换 server 地址
const PASS_USERINFO   = ${userinfo}; // 透传流量信息头

// 【优选服务器列表】
const UNIFIED_SERVERS = [
${srvArr}
];

// 【订阅链接列表】格式：链接${sep}备注（备注可省略）
const SUB_URLS = [
${subArr}
];

// ── 配置区结束 ─────────────────────────────────────────────────


export default {
  async fetch(request) {

    // ── 第一步：并发拉取所有订阅内容 ─────────────────────────
    const tasks = SUB_URLS.map((raw) => {
      const sharpIndex = raw.indexOf("${sep}");
      const url   = sharpIndex === -1 ? raw : raw.slice(0, sharpIndex);
      const label = sharpIndex === -1 ? ""  : raw.slice(sharpIndex + 1);

      return fetch(url.trim(), { headers: { "User-Agent": "${ua}" } })
        .then((r) => {
          if (!r.ok) return null;
          const userinfo = r.headers.get("Subscription-Userinfo");
          return r.text().then((text) => ({ text, label, userinfo }));
        })
        .catch(() => null);
    });
    const results = await Promise.all(tasks);

    // 收集流量信息（取第一个有效的）
    const userinfoHeader = results.find(r => r?.userinfo)?.userinfo || null;


    // ── 第二步：从每个订阅中提取节点行 ──────────────────────
    const proxyEntries = []; // [{ line: "{...}", label: "备注" }]

    for (const res of results) {
      if (!res) continue;
      const { text, label } = res;
      let inProxies = false;

      for (const line of text.split("\\n")) {
        if (/^proxies\\s*:/.test(line)) { inProxies = true; continue; }
        if (inProxies) {
          if (/^\\s+- \\{/.test(line)) {
            proxyEntries.push({
              line: line.trim().replace(/^-\\s*/, ""),
              label,
            });
          } else if (line.trim() && !/^\\s/.test(line)) {
            break;
          }
        }
      }
    }


    // ── 第三步：解析 + 去重 ───────────────────────────────────
    const seen        = new Set();
    const baseProxies = [];

    for (const { line, label } of proxyEntries) {
      const proxy = parseFlowObject(line);
      const key   = proxy.servername || proxy.server;

      // 去重判断（可通过开关关闭）
      if (ENABLE_DEDUP) {
        if (!key || seen.has(key)) continue;
        seen.add(key);
      }

      // servername 模式在这里处理（不依赖 server 的值）
      if (NAME_MODE === "servername" && proxy.servername) {
        proxy.name = proxy.servername;
      }
      // original / server 模式在第四步处理

      proxy._label = label; // 暂存备注，第四步使用
      baseProxies.push(proxy);
    }


    // ── 第四步：按 UNIFIED_SERVERS 展开，生成多组节点 ────────
    // 顺序：① 替换 server → ② 设置 name → ③ 拼接备注 → ④ 加序号
    const nameCount = {};
    const proxies   = [];

    const serverList = (REPLACE_SERVER && UNIFIED_SERVERS.length > 0)
      ? UNIFIED_SERVERS
      : [null]; // null 表示不替换，保持原 server

    for (const serverAddr of serverList) {
      for (const base of baseProxies) {
        const proxy = JSON.parse(JSON.stringify(base));

        // ① 替换 server
        if (serverAddr !== null) proxy.server = serverAddr;

        // ② 根据模式设置 name
        if (NAME_MODE === "server") {
          proxy.name = proxy.server; // 用替换后的 server
        }
        // original / servername 已在第三步或保持不变

        // ③ 拼接备注
        if (proxy._label) proxy.name = proxy.name + LABEL_SEP + proxy._label;
        delete proxy._label;

        // ④ 同名加序号
        if (ENABLE_AUTO_SEQ) {
          if (nameCount[proxy.name] === undefined) {
            nameCount[proxy.name] = 1;
          } else {
            nameCount[proxy.name]++;
            proxy.name = proxy.name + "_" + nameCount[proxy.name];
          }
        }

        proxies.push(proxy);
      }
    }


    // ── 第五步：序列化成 Clash YAML 并返回 ───────────────────
    const lines = ["proxies:"];
    for (const p of proxies) {
      lines.push("  - " + toFlowYaml(p));
    }
    const output = lines.join("\\n") + "\\n";

    const headers = new Headers({
      "Content-Type": "text/yaml; charset=utf-8",
    });
    if (PASS_USERINFO && userinfoHeader) {
      headers.set("Subscription-Userinfo", userinfoHeader);
    }

    return new Response(output, { headers });
  },
};


// ============================================================
// 工具函数：Flow YAML 解析器
// ============================================================
function parseFlowObject(str) {
  str = str.trim();
  if (str.startsWith("{") && str.endsWith("}")) str = str.slice(1, -1);
  return parseKVPairs(str);
}

function parseKVPairs(str) {
  const obj = {};
  let i = 0;

  while (i < str.length) {
    while (i < str.length && str[i] === " ") i++;
    if (i >= str.length) break;

    const keyStart = i;
    while (i < str.length && str[i] !== ":") i++;
    const key = str.slice(keyStart, i).trim();
    i++;
    while (i < str.length && str[i] === " ") i++;

    let value;
    if (str[i] === "{") {
      const start = i;
      let depth = 0;
      while (i < str.length) {
        if (str[i] === "{") depth++;
        else if (str[i] === "}") { depth--; if (depth === 0) { i++; break; } }
        i++;
      }
      value = parseKVPairs(str.slice(start + 1, i - 1));
    } else {
      const start = i;
      while (i < str.length) {
        if (str[i] === "," && str[i + 1] === " ") break;
        i++;
      }
      const raw = str.slice(start, i).trim();
      if (raw === "true")                 value = true;
      else if (raw === "false")           value = false;
      else if (raw !== "" && !isNaN(raw)) value = Number(raw);
      else                                value = raw;
    }

    if (key) obj[key] = value;
    if (str[i] === ",") { i++; while (i < str.length && str[i] === " ") i++; }
  }

  return obj;
}


// ============================================================
// 工具函数：Flow YAML 序列化器
// ============================================================
function toFlowYaml(obj) {
  const parts = [];
  for (const [k, v] of Object.entries(obj)) {
    if (v !== null && typeof v === "object") {
      parts.push(\`\${k}: \${toFlowYaml(v)}\`);
    } else if (typeof v === "boolean" || typeof v === "number") {
      parts.push(\`\${k}: \${v}\`);
    } else {
      const needsQuote = /[,:{}\\[\\]#&*?|<>=!%@\`]/.test(String(v));
      parts.push(needsQuote ? \`\${k}: '\${v}'\` : \`\${k}: \${v}\`);
    }
  }
  return \`{\${parts.join(", ")}}\`;
}`;

  const lines = code.split("\n").length;
  document.getElementById("stat-lines").textContent = lines;
  document.getElementById("output").textContent = code;
}

// ── 复制 ──────────────────────────────────────────────────────
function copyCode() {
  const code = document.getElementById("output").textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "✓ 已复制";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "复制代码";
      btn.classList.remove("copied");
    }, 2000);
  });
}
